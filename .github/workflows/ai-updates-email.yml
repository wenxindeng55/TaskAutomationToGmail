name: Daily AI updates email

on:
  schedule:
    # 09:17 Asia/Shanghai is 01:17 UTC.
    - cron: "17 1 * * *"
  workflow_dispatch:

jobs:
  send-ai-updates:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Send AI updates email
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          EMAIL_TO: ${{ secrets.AI_UPDATES_RECIPIENT || 'deng1543659807@gmail.com' }}
          EMAIL_FROM: ${{ secrets.GOOGLE_SENDER_EMAIL || secrets.GMAIL_SMTP_USER }}
        run: node scripts/ai-updates-email.js
